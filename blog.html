<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============================================================ -->
<!-- NAVIGATION BAR (same component as homepage)                   -->
<!-- ============================================================ -->

  <div class="container">
    <a href="index.html" class="logo">
        <img
            id="navLogo"
            src="images/Anra white logo.png"
            alt="ANRA Institute Logo">
      </a>

    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navCollapse">
      <i class="bi bi-list fs-2" style="color:var(--text)"></i>
    </button>

    <div class="collapse navbar-collapse" id="navCollapse">
      <ul class="navbar-nav mx-auto mt-3 mt-lg-0">
        <li class="nav-item"><a class="nav-link" href="index.html#top">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#courses">Courses</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#topics">Topics</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#dashboard">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" href="blog.html">Blog</a></li>

<!-- ============================================================ -->
<!-- BLOG HEADER                                                   -->
<!-- ============================================================ -->
<header class="hero" style="padding: 4rem 0 2rem;">
  <div class="container">
   <!-- <span class="hero-kicker">// notes on computer science</span> -->
    <h1 style="font-size:clamp(2rem,4vw,3rem);">The ANRA INSTITUTE Blog</h1>
    <p class="lead">Intuition-first articles that sit alongside the courses — read in five minutes, remember for years.</p>
  </div>
</header>

<!-- ============================================================ -->
<!-- show the latest or featured blog                                                   -->
<!-- ============================================================ -->
<section class="container mb-5">

    <div id="featuredPost"></div>

</section>
<!-- ============================================================ -->
<!-- TOPIC FILTER CHIPS                                            -->
<!-- ============================================================ -->
<section class="container mb-3">
  <div class="d-flex flex-wrap gap-2" id="blogFilters"style="margin-top:50px"></div>
</section>

<!-- ============================================================ -->
<!-- FULL BLOG GRID (no data-limit = render every post)            -->
<!-- ============================================================ -->
<section class="section pt-3">
  <div class="container">
    <div class="row g-4" id="blogGrid"></div>
  </div>
</section>

<!-- ============================================================ -->
<!-- FOOTER                                                        -->
<!-- ============================================================ -->
<footer class="footer-cs">
  <div class="container">
    <div class="footer-bottom d-flex justify-content-between flex-wrap gap-2">
      <span>© 2026 CS.edu — built for learners.</span>
      <a href="index.html" style="margin:0;">← Back to home</a>
    </div>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="data_blog.js"></script>
<script src="script.js"></script>
<script>
  /* ---------------------------------------------------------------
     Page-specific behaviour: topic filter chips for the blog grid.
     Lives here (not script.js) since it's only relevant to blog.html.
     --------------------------------------------------------------- */
  document.addEventListener("DOMContentLoaded", () => {
    const filterBar = document.getElementById("blogFilters");
    const grid = document.getElementById("blogGrid");
    if (!filterBar || typeof BLOG_POSTS === "undefined") return;

    const topics = ["All", ...new Set(BLOG_POSTS.map(p => p.topic))];

    function renderGrid(filter = "All") {

    const keyword =
        document
        .getElementById("blogSearchInput")
        .value
        .toLowerCase();

    const posts = BLOG_POSTS.filter(post => {

        const topicMatch =
            filter === "All" ||
            post.topic === filter;

        const searchMatch =
            post.title.toLowerCase().includes(keyword) ||
            post.excerpt.toLowerCase().includes(keyword);

        return topicMatch && searchMatch;
    });

    grid.innerHTML =
        posts.map(post => `

        <div class="col-md-6 col-lg-4 reveal in">

            <article class="blog-card h-100">

                <a
                    href="post.html?id=${post.id}"
                    class="text-decoration-none">

                    ${
                        post.image
                        ?
                        `<img
                            src="${post.image}"
                            alt="${post.title}"
                            class="img-fluid blog-image">`
                        :
                        `<div class="blog-cover ${post.cover}">
                            # ${post.topic}
                         </div>`
                    }

                    <div class="blog-body">

                        <div class="blog-meta">

                            <span>
                            ${new Date(post.date)
                                .toLocaleDateString(
                                "en-US",
                                {
                                    month:"short",
                                    day:"numeric",
                                    year:"numeric"
                                })}
                            </span>

                            <span>
                                · ${post.readTime}
                            </span>

                        </div>

                        <h3>
                            ${post.title}
                        </h3>

                        <p>
                            ${post.excerpt}
                        </p>

                        <span
                            class="read-more">

                            Read Article →
                        </span>

                    </div>

                </a>

            </article>

        </div>

        `).join("")

        ||

        `<div class="col-12 text-center py-5">
            <h4>No Articles Found</h4>
            <p style="color:var(--text-faint)">
                Try another keyword or topic.
            </p>
        </div>`;
}

    filterBar.innerHTML = topics.map((t, i) => `
      <button class="btn-outline-mint btn btn-sm filter-chip ${i === 0 ? 'active-chip' : ''}" data-topic="${t}"
        style="${i === 0 ? 'border-color:var(--mint);color:var(--mint);' : ''}">${t}</button>
    `).join("");

    filterBar.querySelectorAll(".filter-chip").forEach(btn => {
      btn.addEventListener("click", () => {
        filterBar.querySelectorAll(".filter-chip").forEach(b => { b.style.borderColor = ""; b.style.color = ""; });
        btn.style.borderColor = "var(--mint)";
        btn.style.color = "var(--mint)";
        renderGrid(btn.dataset.topic);
      });
    });
    const searchInput =
    document.getElementById(
        "blogSearchInput"
    );

searchInput.addEventListener(
    "input",
    () => {

        const activeFilter =
            document
            .querySelector(
                ".filter-chip[style*='var(--mint)']"
            )?.dataset.topic
            || "All";

        renderGrid(activeFilter);

    }
);

    renderGrid("All");
  });
</script>
</body>
</html>
